<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olivia Miller</title>
  <meta name="description" content="Olivia Miller | Links oficiales" />
  <style>
    :root{
      --bg:#090909;
      --card:rgba(8,8,8,.58);
      --card-border:rgba(212,175,55,.36);
      --gold:#d4af37;
      --gold-soft:#f3d77b;
      --text:#f6f2e8;
      --muted:#d8d1bf;
      --shadow:0 20px 50px rgba(0,0,0,.45);
      --radius:26px;
      --btn-radius:18px;
      --blur:14px;
      --phone-w:min(92vw, 420px);
      --phone-h:min(86vh, 820px);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(circle at top, #1a1a1a 0%, #090909 48%, #000 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }

    body{
      display:grid;
      place-items:center;
      padding:22px;
      overflow-x:hidden;
    }

    .phone{
      position:relative;
      width:var(--phone-w);
      height:var(--phone-h);
      border-radius:38px;
      overflow:hidden;
      box-shadow:
        0 30px 80px rgba(0,0,0,.65),
        inset 0 0 0 1px rgba(255,255,255,.06);
      background:#000;
      isolation:isolate;
    }

    .bg{
      position:absolute;
      inset:0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,.18), rgba(0,0,0,.34)),
        linear-gradient(to top, rgba(0,0,0,.82) 0%, rgba(0,0,0,.58) 32%, rgba(0,0,0,.15) 62%, rgba(0,0,0,.28) 100%),
        url("fondo.jpg") center 28% / cover no-repeat;
      transform:scale(1.02);
    }

    .content{
      position:relative;
      z-index:2;
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-end;
      padding:26px 18px 22px;
    }

    .brand{
      position:absolute;
      top:38px;
      left:20px;
      right:20px;
      text-align:center;
    }

    .brand h1{
      margin:0;
      font-size:clamp(2rem, 5vw, 2.7rem);
      font-weight:700;
      letter-spacing:.4px;
      color:#f3e3ad;
    }

    .brand p{
      margin:10px 0 0;
      font-size:.92rem;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:rgba(255,245,224,.78);
    }

    .panel{
      width:100%;
      max-width:360px;
      padding:14px;
      border-radius:var(--radius);
      border:1px solid rgba(255,255,255,.06);
      background:rgba(0,0,0,.55);
      backdrop-filter:blur(var(--blur));
      box-shadow:var(--shadow);
    }

    .links{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .link{
      display:flex;
      align-items:center;
      gap:14px;
      width:100%;
      min-height:62px;
      padding:14px 16px;
      text-decoration:none;
      color:white;
      border-radius:var(--btn-radius);
      background:rgba(0,0,0,.45);
      border:1px solid rgba(212,175,55,.22);
      transition:0.2s;
    }

    .link:hover{
      transform:translateY(-2px);
      border-color:rgba(243,215,123,.42);
    }

    .icon{
      width:42px;
      height:42px;
      border-radius:14px;
      display:grid;
      place-items:center;
      color:var(--gold-soft);
      background:rgba(255,255,255,.03);
      border:1px solid rgba(212,175,55,.26);
    }

    .label{
      font-size:1rem;
      font-weight:700;
      color:#fff9ea;
    }

    .sub{
      font-size:.8rem;
      color:var(--muted);
    }

    .footer{
      text-align:center;
      margin-top:14px;
      font-size:.76rem;
      color:rgba(255,245,224,.66);
    }
  </style>
</head>
<body>
  <main class="phone">
    <div class="bg"></div>

    <section class="content">
      <header class="brand">
        <h1>Olivia Miller</h1>
        <p>Links oficiales</p>
      </header>

      <div class="panel">
        <nav class="links">

          <a class="link" href="XXXXXXXXXXXXXXXXXXXXXXXXXX" target="_blank">
            <div class="icon">★</div>
            <div>
              <div class="label">OnlyFans</div>
              <div class="sub">Acceso oficial</div>
            </div>
          </a>

          <a class="link" href="XXXXXXXXXXXXXXXXXXXXXXXXXX" target="_blank">
            <div class="icon">✈</div>
            <div>
              <div class="label">Telegram</div>
              <div class="sub">Canal y contacto</div>
            </div>
          </a>

          <a class="link" href="https://www.instagram.com/olivia.miller_08?igsh=aGJucGY1M3A1czdw" target="_blank">
            <div class="icon">◎</div>
            <div>
              <div class="label">Instagram</div>
              <div class="sub">@olivia.miller_08</div>
            </div>
          </a>

          <a class="link" href="https://x.com/OliviaMill67053" target="_blank">
            <div class="icon">X</div>
            <div>
              <div class="label">X</div>
              <div class="sub">@OliviaMill67053</div>
            </div>
          </a>

        </nav>

        <div class="footer">© Olivia Miller</div>
      </div>
    </section>
  </main>
</body>
</html>
