<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olivia Miller</title>
  <meta name="description" content="Olivia Miller | Oficial Links" />
  <style>
    :root{
      --bg:#060606;
      --card:rgba(10,10,10,.58);
      --gold:#d4af37;
      --gold-soft:#f6d97a;
      --gold-line:rgba(212,175,55,.35);
      --text:#f7f3ea;
      --muted:#d3ccb8;
      --shadow:0 18px 55px rgba(0,0,0,.45);
      --radius:28px;
      --btn-radius:22px;
      --phone-w:min(92vw,420px);
      --phone-h:min(88vh,820px);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(circle at top, #191919 0%, #090909 45%, #000 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }

    body{
      display:grid;
      place-items:center;
      padding:18px;
    }

    .phone{
      position:relative;
      width:var(--phone-w);
      height:var(--phone-h);
      border-radius:40px;
      overflow:hidden;
      background:#000;
      box-shadow:
        0 30px 90px rgba(0,0,0,.68),
        inset 0 0 0 1px rgba(255,255,255,.04);
      isolation:isolate;
    }

    .bg{
      position:absolute;
      inset:0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,.10), rgba(0,0,0,.28)),
        linear-gradient(to top, rgba(0,0,0,.92) 0%, rgba(0,0,0,.70) 32%, rgba(0,0,0,.18) 62%, rgba(0,0,0,.38) 100%),
        url("fondo.jpg") center 25% / cover no-repeat;
      transform:scale(1.03);
    }

    .bg::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 20% 12%, rgba(212,175,55,.18), transparent 25%),
        radial-gradient(circle at 80% 18%, rgba(212,175,55,.10), transparent 18%),
        linear-gradient(to bottom, transparent 0%, rgba(0,0,0,.12) 45%, rgba(0,0,0,.28) 100%);
      pointer-events:none;
    }

    .content{
      position:relative;
      z-index:2;
      height:100%;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      align-items:center;
      padding:26px 16px 22px;
    }

    .brand{
      position:absolute;
      top:38px;
      left:20px;
      right:20px;
      text-align:center;
    }

    .brand h1{
      margin:0;
      font-size:clamp(2rem,5vw,2.75rem);
      line-height:1.05;
      letter-spacing:.02em;
      color:#f4e0a3;
      text-shadow:
        0 3px 18px rgba(0,0,0,.45),
        0 0 18px rgba(212,175,55,.08);
    }

    .brand p{
      margin:10px 0 0;
      font-size:.82rem;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:rgba(255,248,230,.76);
      text-shadow:0 2px 10px rgba(0,0,0,.4);
    }

    .panel{
      width:100%;
      max-width:368px;
      padding:14px;
      border-radius:var(--radius);
      border:1px solid rgba(255,255,255,.05);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        var(--card);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
    }

    .links{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .link{
      position:relative;
      display:flex;
      align-items:center;
      gap:14px;
      width:100%;
      min-height:68px;
      padding:14px 16px;
      text-decoration:none;
      color:var(--text);
      border-radius:var(--btn-radius);
      background:
        linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.01)),
        rgba(0,0,0,.45);
      border:1px solid rgba(212,175,55,.22);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.03),
        0 10px 28px rgba(0,0,0,.22);
      overflow:hidden;
      opacity:0;
      transform:translateY(18px);
      animation:rise .65s ease forwards;
      transition:
        transform .22s ease,
        box-shadow .22s ease,
        border-color .22s ease,
        background .22s ease;
    }

    .link:nth-child(1){animation-delay:.08s}
    .link:nth-child(2){animation-delay:.16s}
    .link:nth-child(3){animation-delay:.24s}

    .link::before{
      content:"";
      position:absolute;
      inset:-1px;
      background:linear-gradient(90deg, transparent, rgba(246,217,122,.22), transparent);
      transform:translateX(-140%);
      transition:transform .8s ease;
      pointer-events:none;
    }

    .link:hover::before,
    .link:focus-visible::before{
      transform:translateX(140%);
    }

    .link:hover,
    .link:focus-visible{
      transform:translateY(-3px) scale(1.01);
      border-color:rgba(246,217,122,.42);
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015)),
        rgba(0,0,0,.55);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 16px 34px rgba(0,0,0,.28),
        0 0 0 1px rgba(212,175,55,.06);
      outline:none;
    }

    .link.primary{
      min-height:74px;
      border-color:rgba(246,217,122,.38);
      background:
        linear-gradient(180deg, rgba(246,217,122,.08), rgba(255,255,255,.015)),
        rgba(12,12,12,.62);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 16px 36px rgba(0,0,0,.3),
        0 0 26px rgba(212,175,55,.08);
    }

    .icon{
      flex:0 0 46px;
      width:46px;
      height:46px;
      border-radius:15px;
      display:grid;
      place-items:center;
      color:var(--gold-soft);
      background:
        radial-gradient(circle at 30% 25%, rgba(246,217,122,.18), transparent 38%),
        rgba(255,255,255,.03);
      border:1px solid rgba(212,175,55,.28);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
      font-size:1.1rem;
      font-weight:700;
    }

    .text-wrap{
      min-width:0;
      display:flex;
      flex-direction:column;
    }

    .label{
      font-size:1.02rem;
      font-weight:700;
      color:#fff9ea;
      letter-spacing:.01em;
    }

    .sub{
      margin-top:2px;
      font-size:.82rem;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .arrow{
      margin-left:auto;
      color:rgba(246,217,122,.85);
      font-size:1.1rem;
      transition:transform .2s ease;
    }

    .link:hover .arrow,
    .link:focus-visible .arrow{
      transform:translateX(3px);
    }

    .footer{
      margin-top:14px;
      text-align:center;
      font-size:.75rem;
      letter-spacing:.08em;
      color:rgba(255,248,230,.62);
    }

    .home-indicator{
      position:absolute;
      left:50%;
      bottom:10px;
      transform:translateX(-50%);
      width:122px;
      height:5px;
      border-radius:999px;
      background:rgba(255,255,255,.24);
      z-index:3;
    }

    @keyframes rise{
      from{opacity:0; transform:translateY(18px);}
      to{opacity:1; transform:translateY(0);}
    }

    @media (max-width:420px){
      .content{padding:22px 14px 20px}
      .panel{padding:12px}
      .link{min-height:64px}
      .link.primary{min-height:70px}
      .icon{width:44px;height:44px}
    }
  </style>
</head>

</body>
</html>
