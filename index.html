<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olivia Miller</title>
  <meta name="description" content="Olivia Miller | Official Links" />
  <style>
    :root{
      --gold:#d4af37;
      --gold-soft:#f6d97a;
      --gold-line:rgba(212,175,55,.28);
      --text:#f7f3ea;
      --muted:rgba(255,248,230,.72);
      --panel:rgba(8,8,8,.56);
      --panel-2:rgba(0,0,0,.44);
      --shadow:0 24px 70px rgba(0,0,0,.55);
      --radius:30px;
      --btn-radius:22px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(circle at top, #171717 0%, #080808 45%, #000 100%);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
    }

    body{
      display:grid;
      place-items:center;
      padding:18px;
    }

    .phone{
      position:relative;
      width:min(92vw, 420px);
      height:min(88vh, 820px);
      border-radius:42px;
      overflow:hidden;
      background:#000;
      box-shadow:
        0 30px 90px rgba(0,0,0,.7),
        inset 0 0 0 1px rgba(255,255,255,.04);
      isolation:isolate;
    }

    .bg{
      position:absolute;
      inset:0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,.14), rgba(0,0,0,.28)),
        linear-gradient(to top, rgba(0,0,0,.92) 0%, rgba(0,0,0,.68) 34%, rgba(0,0,0,.18) 65%, rgba(0,0,0,.32) 100%),
        url("fondo.jpg") center 24% / cover no-repeat;
      transform:scale(1.03);
    }

    .bg::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 18% 14%, rgba(212,175,55,.20), transparent 24%),
        radial-gradient(circle at 84% 20%, rgba(212,175,55,.10), transparent 18%),
        linear-gradient(to bottom, transparent 0%, rgba(0,0,0,.10) 40%, rgba(0,0,0,.26) 100%);
      pointer-events:none;
    }

    .content{
      position:relative;
      z-index:2;
      height:100%;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      align-items:center;
      padding:28px 16px 22px;
    }

    .brand{
      position:absolute;
      top:38px;
      left:20px;
      right:20px;
      text-align:center;
    }

    .brand h1{
      margin:0;
      font-size:clamp(2.2rem, 6vw, 3rem);
      line-height:1.05;
      font-weight:800;
      letter-spacing:.01em;
      color:#f4e0a3;
      text-shadow:
        0 4px 18px rgba(0,0,0,.42),
        0 0 20px rgba(212,175,55,.08);
    }

    .brand p{
      margin:10px 0 0;
      font-size:.82rem;
      letter-spacing:.28em;
      text-transform:uppercase;
      color:var(--muted);
      text-shadow:0 2px 10px rgba(0,0,0,.35);
    }

    .panel{
      width:100%;
      max-width:370px;
      padding:14px;
      border-radius:var(--radius);
      border:1px solid rgba(255,255,255,.05);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        var(--panel);
      backdrop-filter:blur(13px);
      -webkit-backdrop-filter:blur(13px);
      box-shadow:var(--shadow);
    }

    .links{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .link{
      position:relative;
      display:flex;
      align-items:center;
      gap:14px;
      min-height:68px;
      width:100%;
      padding:14px 16px;
      border-radius:var(--btn-radius);
      text-decoration:none;
      color:var(--text);
      background:
        linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.01)),
        var(--panel-2);
      border:1px solid var(--gold-line);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.03),
        0 10px 28px rgba(0,0,0,.22);
      overflow:hidden;
      opacity:0;
      transform:translateY(18px);
      animation:rise .7s ease forwards;
      transition:
        transform .22s ease,
        box-shadow .22s ease,
        border-color .22s ease,
        background .22s ease;
    }

    .link:nth-child(1){animation-delay:.08s}
    .link:nth-child(2){animation-delay:.16s}
    .link:nth-child(3){animation-delay:.24s}

    .link::before{
      content:"";
      position:absolute;
      inset:-1px;
      background:linear-gradient(90deg, transparent, rgba(246,217,122,.22), transparent);
      transform:translateX(-145%);
      transition:transform .85s ease;
      pointer-events:none;
    }

    .link:hover::before,
    .link:focus-visible::before{
      transform:translateX(145%);
    }

    .link:hover,
    .link:focus-visible{
      transform:translateY(-3px) scale(1.01);
      border-color:rgba(246,217,122,.42);
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015)),
        rgba(0,0,0,.56);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 16px 34px rgba(0,0,0,.3),
        0 0 0 1px rgba(212,175,55,.06);
      outline:none;
    }

    .link.primary{
      min-height:74px;
      border-color:rgba(246,217,122,.42);
      background:
        linear-gradient(180deg, rgba(246,217,122,.09), rgba(255,255,255,.015)),
        rgba(10,10,10,.62);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 16px 38px rgba(0,0,0,.32),
        0 0 24px rgba(212,175,55,.08);
    }

    .icon{
      flex:0 0 46px;
      width:46px;
      height:46px;
      display:grid;
      place-items:center;
      border-radius:15px;
      color:var(--gold-soft);
      border:1px solid rgba(212,175,55,.30);
      background:
        radial-gradient(circle at 30% 25%, rgba(246,217,122,.18), transparent 38%),
        rgba(255,255,255,.03);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
      font-size:1.1rem;
      font-weight:800;
    }

    .label{
      font-size:1.02rem;
      font-weight:700;
      letter-spacing:.01em;
      color:#fff9ea;
    }

    .arrow{
      margin-left:auto;
      color:rgba(246,217,122,.9);
      font-size:1.15rem;
      transition:transform .2s ease;
    }

    .link:hover .arrow,
    .link:focus-visible .arrow{
      transform:translateX(3px);
    }

    .footer{
      margin-top:14px;
      text-align:center;
      font-size:.76rem;
      letter-spacing:.08em;
      color:rgba(255,248,230,.62);
    }

    .home-indicator{
      position:absolute;
      left:50%;
      bottom:10px;
      transform:translateX(-50%);
      width:124px;
      height:5px;
      border-radius:999px;
      background:rgba(255,255,255,.22);
      z-index:3;
    }

    @keyframes rise{
      from{opacity:0; transform:translateY(18px);}
      to{opacity:1; transform:translateY(0);}
    }

    @media (max-width:420px){
      .content{padding:24px 14px 20px}
      .panel{padding:12px}
      .link{min-height:64px}
      .link.primary{min-height:70px}
      .icon{width:44px;height:44px}
    }
  </style>
</head>
<body>
  <main class="phone">
    <div class="bg"></div>

    <section class="content">
      <header class="brand">
        <h1>Olivia Miller</h1>
        <p>Official Links</p>
      </header>

      <div class="panel">
        <nav class="links">
          <a class="link primary" href="https://onlyfans.com/oliviamiller.08" target="_blank" rel="noopener noreferrer">
            <div class="icon">★</div>
            <div class="label">OnlyFans</div>
            <div class="arrow">→</div>
          </a>

          <a class="link" href="https://www.instagram.com/oliviamiller__8?igsh=bmNzZ29wOTAwbHRm" target="_blank" rel="noopener noreferrer">
            <div class="icon">◎</div>
            <div class="label">Instagram</div>
            <div class="arrow">→</div>
          </a>

          <a class="link" href="https://x.com/OliviaMill67053" target="_blank" rel="noopener noreferrer">
            <div class="icon">X</div>
            <div class="label">X</div>
            <div class="arrow">→</div>
          </a>
        </nav>

        <div class="footer">© Olivia Miller</div>
      </div>
    </section>

    <div class="home-indicator"></div>
  </main>
</body>
</html>
